[project]
name = "euvox-surrogate"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "euvox-search-space",
    "scikit-learn>=1.5",
    "numpy>=1.26",
    "joblib>=1.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/euvox"]
